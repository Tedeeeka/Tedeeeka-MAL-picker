name: Build portable executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mal_picker_linux
          - os: windows-latest
            artifact_name: mal_picker_windows.exe
          - os: macos-latest
            artifact_name: mal_picker_macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name mal_picker_windows app.py

      - name: Build (macOS / Linux)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --name ${{ matrix.artifact_name }} app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/mal_picker_windows.exe
            dist/mal_picker_macos
            dist/mal_picker_linux

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mal_picker_windows.exe
            dist/mal_picker_macos
            dist/mal_picker_linux
